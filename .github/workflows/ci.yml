---
name: CI Checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Validate YAML files
        run: |
          python3 -c "
          import yaml
          import os
          import glob

          errors = 0
          for yaml_file in glob.glob('.github/workflows/*.yml'):
              try:
                  with open(yaml_file, 'r') as f:
                      yaml.safe_load(f)
                  print(f'✓ {yaml_file} is valid')
              except yaml.YAMLError as e:
                  print(f'✗ {yaml_file} has errors:')
                  print(f'  {e}')
                  errors += 1

          if errors > 0:
              exit(1)
          "
