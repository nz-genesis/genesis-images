---
name: Build and Push to GHCR

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      - name: List directory structure
        run: |
          echo "Current directory:"
          pwd
          echo ""
          echo "Contents of repo:"
          ls -la
          echo ""
          echo "Looking for genesis-images:"
          if [ -d "genesis-images" ]; then
            echo "genesis-images found!"
            ls -la genesis-images/
          else
            echo "genesis-images NOT found"
          fi

      - name: Build and push jina-clip
        if: success()
        uses: docker/build-push-action@v4
        with:
          context: ./genesis-images/jina-clip
          push: true
          tags: |
            ghcr.io/nz-genesis/jina-clip:latest
            ghcr.io/nz-genesis/jina-clip:${{ github.sha }}
        continue-on-error: true

      - name: Build and push nz-litellm
        if: success()
        uses: docker/build-push-action@v4
        with:
          context: ./genesis-images/nz-litellm
          push: true
          tags: |
            ghcr.io/nz-genesis/nz-litellm:latest
            ghcr.io/nz-genesis/nz-litellm:${{ github.sha }}
        continue-on-error: true

      - name: Build and push nz-skill-runner
        if: success()
        uses: docker/build-push-action@v4
        with:
          context: ./genesis-images/nz-skill-runner
          push: true
          tags: |
            ghcr.io/nz-genesis/nz-skill-runner:latest
            ghcr.io/nz-genesis/nz-skill-runner:${{ github.sha }}
        continue-on-error: true
