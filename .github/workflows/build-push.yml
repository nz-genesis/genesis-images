---
name: Build and Push to GHCR

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Build and push jina-clip
        uses: docker/build-push-action@v4
        with:
          context: ./genesis-images/jina-clip
          push: true
          tags: |
            ghcr.io/nz-genesis/jina-clip:latest
            ghcr.io/nz-genesis/jina-clip:${{ github.sha }}

      - name: Build and push nz-litellm
        uses: docker/build-push-action@v4
        with:
          context: ./genesis-images/nz-litellm
          push: true
          tags: |
            ghcr.io/nz-genesis/nz-litellm:latest
            ghcr.io/nz-genesis/nz-litellm:${{ github.sha }}

      - name: Build and push nz-skill-runner
        uses: docker/build-push-action@v4
        with:
          context: ./genesis-images/nz-skill-runner
          push: true
          tags: |
            ghcr.io/nz-genesis/nz-skill-runner:latest
            ghcr.io/nz-genesis/nz-skill-runner:${{ github.sha }}
