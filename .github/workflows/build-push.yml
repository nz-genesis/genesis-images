name: Build and Push to GHCR

on:
  push:
    branches:
      - main
    paths:
      - 'genesis-images/jina-clip/**'
      - 'genesis-images/nz-litellm/**'
      - 'genesis-images/nz-skill-runner/**'
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        image:
          - jina-clip
          - nz-litellm
          - nz-skill-runner

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ghcr.io/nz-genesis/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=${{ matrix.image }}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: ./genesis-images/${{ matrix.image }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/nz-genesis/${{ matrix.image }}:buildcache
          cache-to: type=registry,ref=ghcr.io/nz-genesis/${{ matrix.image }}:buildcache,mode=max

      - name: Image digest
        run: echo "Built ${{ matrix.image }} with digest ${{ steps.docker_build.outputs.digest }}"

      - name: Trigger Portainer deployment (optional)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if [ ! -z "${{ secrets.PORTAINER_WEBHOOK_URL }}" ] && [ ! -z "${{ secrets.PORTAINER_TOKEN }}" ]; then
            curl -X POST \
              -H "Authorization: Bearer ${{ secrets.PORTAINER_TOKEN }}" \
              "${{ secrets.PORTAINER_WEBHOOK_URL }}" || echo "Portainer webhook skipped (not configured)"
          else
            echo "Portainer webhook not configured (optional)"
          fi
        continue-on-error: true
