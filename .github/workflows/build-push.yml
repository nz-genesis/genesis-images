name: Build and Push Images

on:
  push:
    branches:
      - main
    paths:
      - 'jina-clip/**'
      - 'nz-*/**'
      - '.github/workflows/build-push.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [jina-clip, nz-litellm, nz-skill-runner, nz-lightrag, nz-mem0]
    
    steps:
      # 1. Очистка места (CRITICAL для больших образов)
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: false

      # 2. Checkout репозитория
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # 3. Secret scanning с TruffleHog
      - name: Secret scanning with TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

      # 4. Setup Docker Buildx для сборки образов
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 5. Логин в GHCR
      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      # 6. Сборка и пуш образа в GHCR
      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v4
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ghcr.io/nz-genesis/${{ matrix.service }}:latest
            ghcr.io/nz-genesis/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 7. Очистка Docker системы (предотвращает переполнение на раннере)
      - name: Prune Docker System
        if: always()
        run: docker system prune -af --volumes

      # 8. Логирование результата
      - name: Log image pushed
        if: success()
        run: |
          echo "✅ Successfully built and pushed: ghcr.io/nz-genesis/${{ matrix.service }}:latest"
          echo "   SHA: ghcr.io/nz-genesis/${{ matrix.service }}:${{ github.sha }}"

      # 9. Уведомление об ошибке (опционально)
      - name: Notify on failure
        if: failure()
        run: echo "❌ Failed to build ${{ matrix.service }}"
