name: Build and Push Images

on:
  push:
    branches:
      - main
    paths:
      - 'jina-clip/**'
      - 'nz-*/**'
      - '.github/workflows/build-push.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [jina-clip, nz-litellm, nz-skill-runner, nz-lightrag, nz-mem0]
    
    steps:
      # 1. Очистка места (CRITICAL STEP)
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          # Удаляем ненужное, чтобы освободить ~10GB+
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: false

      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v4
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ghcr.io/nz-genesis/${{ matrix.service }}:latest
            ghcr.io/nz-genesis/${{ matrix.service }}:${{ github.sha }}

      # Очистка кэша после сборки (чтобы следующая job в matrix не упала, если они на одном раннере)
      - name: Prune Docker System
        if: always()
        run: docker system prune -af
